name = "termp-web"
main = "src/index.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "termp_feedback"
database_name = "termp-feedback"
database_id = "a922d9e3-d0b1-4bb0-a728-5d98ff9584d1"

[[ratelimits]]
name = "FEEDBACK_PRE_LIMITER"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "FEEDBACK_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "CONTACT_LIMITER"
namespace_id = "1003"
  [ratelimits.simple]
  limit = 10
  period = 60

[vars]
ENVIRONMENT = "production"
TURNSTILE_EXPECTED_ACTION = "turnstile-spin-v2"
TURNSTILE_EXPECTED_HOSTNAME = "termp.polter.sh"

# Store TURNSTILE_SECRET_KEY with `npx wrangler secret put TURNSTILE_SECRET_KEY`.
# Local Turnstile bypass requires both ENVIRONMENT = "development" and
# FEEDBACK_DEV_BYPASS = "true" in a local-only Wrangler environment.
