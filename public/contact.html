<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Terminal Presence</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="./fonts/jetbrains-mono.css">
  <style>
    :root {
      color-scheme: dark;
      font-family: "JetBrains Mono", monospace;
      background: #050506;
      color: #e5e5e5;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(circle at 50% 0, #17171a 0, transparent 42%),
        #050506;
    }

    main {
      width: min(100%, 42rem);
      padding: clamp(1.5rem, 5vw, 3rem);
      border: 1px solid #28282c;
      border-radius: 12px;
      background: #0b0b0dcc;
      box-shadow: 0 1.5rem 5rem #0009;
    }

    a { color: #a8ff60; }
    h1 { margin: 0 0 .5rem; font-size: clamp(1.8rem, 6vw, 2.6rem); }
    p { margin: 0 0 2rem; color: #99999f; line-height: 1.6; }
    label { display: block; margin: 1rem 0 .45rem; font-size: .85rem; color: #b8b8be; }

    input,
    textarea,
    button {
      width: 100%;
      border: 1px solid #34343a;
      border-radius: 6px;
      font: inherit;
    }

    input,
    textarea {
      padding: .8rem;
      color: #f4f4f5;
      background: #111114;
    }

    input:focus,
    textarea:focus {
      outline: 2px solid #a8ff60;
      outline-offset: 2px;
    }

    textarea { min-height: 10rem; resize: vertical; }

    button {
      margin-top: 1.25rem;
      padding: .85rem 1rem;
      border-color: #a8ff60;
      color: #050506;
      background: #a8ff60;
      cursor: pointer;
    }

    button:disabled { opacity: .6; cursor: wait; }
    #status { min-height: 1.5em; margin: 1rem 0 0; }
    #status.success { color: #a8ff60; }
    #status.error { color: #ff6b6b; }

    .honeypot {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main>
    <h1>Contact termp</h1>
    <p>Questions, ideas, or feedback? Send a note and we’ll get back to you.</p>

    <form id="contact-form">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" maxlength="5000" required></textarea>

      <div class="honeypot" aria-hidden="true">
        <label for="company">Company</label>
        <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
      </div>

      <button type="submit">Send message</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#contact-form");
    const button = form.querySelector("button");
    const status = document.querySelector("#status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      status.className = "";
      status.textContent = "Sending…";

      const data = Object.fromEntries(new FormData(form));

      try {
        const response = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          throw new Error(result.error || "Could not send your message.");
        }

        form.reset();
        status.className = "success";
        status.textContent = "Thanks — your message was received.";
      } catch (error) {
        status.className = "error";
        status.textContent = error.message || "Could not send your message. Please try again.";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
